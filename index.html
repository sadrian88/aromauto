<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AromAuto - Odorizante Personalizate</title>
  <link rel="icon" href="img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <ul>
      <li><a href="#top">Home</a></li>
      <li><a href="#produse">Produse</a></li>
      <li><a href="#despre">Despre</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <header>
    <h1>AromAuto</h1>
    <p>Odorizante auto personalizate, printate 3D</p>
  </header>

  <section id="produse">
    <h2>Favoritele clientilor</h2>
    <div class="product-list">
      <div class="product">
        <img src="img/blackclassic.png" alt="blackclassic">
        <h3>Black Classic</h3>
      </div>
      <div class="product">
        <img src="img/grunerapfel.png" alt="grunerapfel">
        <h3>Gr&uuml;ner Apfel</h3>
      </div>
      <div class="product">
        <img src="img/pinacolada.png" alt="Odorizant pinacolada">
        <h3>Pi&ntilde;a Colada</h3>
      </div>
      <div class="product">
        <img src="img/vanillaroma.png" alt="Odorizant vanillaroma">
        <h3>Vanillaroma</h3>
      </div>
    </div>
    <button onclick="alert('Formular de comandă în curând')">Comandă acum</button>
  </section>

  <footer>
    <p>© 2025 AromAuto  Contact: contact@aromauto.ro</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
